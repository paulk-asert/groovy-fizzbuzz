plugins {
    id 'groovy'
}

// Everything is resolved from the ASF snapshot repository — the same self-
// contained setup the sibling groovy-verify project uses. No hand-built Groovy
// in mavenLocal is required. If a freshly-published snapshot looks stale, run
// with `--refresh-dependencies`.
repositories {
    mavenCentral()
    maven { url = 'https://repository.apache.org/content/repositories/snapshots' }
}

def groovyVersion = '6.0.0-SNAPSHOT'

dependencies {
    implementation "org.apache.groovy:groovy:$groovyVersion"
    implementation "org.apache.groovy:groovy-contracts:$groovyVersion"
    implementation "org.apache.groovy:groovy-typecheckers:$groovyVersion"
    implementation "org.apache.groovy:groovy-ginq:$groovyVersion"
}

tasks.withType(GroovyCompile).configureEach {
    groovyOptions.parameters = true
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

def runAll = tasks.register("run.${project.name}.All") {
    group = 'Application'
}

// Register a run task per Groovy script (run.ScriptName), mirroring the
// groovy6-functional companion repo. Scripts under domain/ or util/ are skipped.
sourceSets.main.allSource.filter { it.name.endsWith('.groovy') }.each { source ->
    var path = source.absolutePath
    if (path.contains('domain') || path.contains('util')) return
    var name = source.name - '.groovy'
    var subtask = tasks.register("run.$name", JavaExec) {
        dependsOn compileGroovy
        group = 'Application'
        description = "Run $source.name as a JVM application/Groovy script"
        classpath = sourceSets.main.runtimeClasspath
        mainClass = name
        jvmArgs = ['--enable-native-access=ALL-UNNAMED'] // avoid warning on JDK25
    }
    runAll.configure {
        dependsOn subtask
    }
}
